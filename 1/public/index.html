<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameMatch — Подбор игр по ПК</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 GameMatch</h1>
            <p>Подбери игру под свой компьютер</p>
        </header>

        <div class="main-grid">
            <div class="form-card">
                <h2>⚙️ Характеристики ПК</h2>
                
                <div class="input-group">
                    <label>🎮 Видеокарта</label>
                    <input type="text" id="gpu" placeholder="RTX 3060, GTX 1660..." value="RTX 3060">
                </div>

                <div class="input-group">
                    <label>⚡ Процессор</label>
                    <input type="text" id="cpu" placeholder="Intel i5, Ryzen 5..." value="Ryzen 5 5600X">
                </div>

                <div class="input-group">
                    <label>🧠 ОЗУ (ГБ)</label>
                    <input type="range" id="ram" min="2" max="32" value="16" step="2">
                    <span id="ramValue">16 ГБ</span>
                </div>

                <div class="input-group">
                    <label>🎯 Жанры</label>
                    <div id="genresList" class="genres-box"></div>
                </div>

                <button id="searchBtn">🔍 ПОДОБРАТЬ ИГРЫ</button>
            </div>

            <div class="results-card">
                <h2>🎲 Рекомендации</h2>
                <div id="resultsList" class="results-list"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
